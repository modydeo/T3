<!DOCTYPE html>
<html>
<head>
  <title>Tekken 3 - EmulatorJS</title>
  <meta charset="UTF-8">
</head>
<body>
  <div id="game"></div>

  <script>
    EJS_player = "#game";
    EJS_core = "psx";
    
    // Game file (CHD)
    EJS_gameUrl = "https://archive.org/download/ps1-rip-chd-ck/Tekken%203.chd";
    
    // BIOS file
    EJS_biosUrl = "https://psx.arthus.net/roms/bios/SCPH-5501.BIN";
    
    // Optional settings
    EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
  </script>

  <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
